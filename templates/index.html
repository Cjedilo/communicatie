<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Communicatie</title>
    <link rel="stylesheet" href="/communicatie.css">
</head>
<body>
    <header>
        <span id="title">Communicatie</span>
        <nav id="nav">
            {% if logged_in %}
            <a href="javascript:communicatie.show_page('/channels.html')">Channels</a>
            <a href="javascript:communicatie.show_page('/user.html')">{{ user_name }}</a>
            <a href="/logout">Logout</a>
            {% else %}
            <a href="javascript:communicatie.show_page('/login.html')">Login</a>
            {% endif %}
        </nav>
    </header>

    <main id="main"></main>

    <div id="error" class="hidden"></div>

    <script src="/communicatie.js"></script>
    <script>
        communicatie.init(
            {{ 'true' if logged_in else 'false' }},
            "{{ user_id }}",
            "{{ user_name }}",
            {{ 'true' if is_owner else 'false' }}
        );
    </script>
</body>
</html>
