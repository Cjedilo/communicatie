<section class="chat-page">

    <div id="member_manager" class="hidden">
        <div class="member_columns">
            <div>
                <h4>Members</h4>
                <ul id="members_list"
                    class="member-drop-zone"
                    ondragover="event.preventDefault()"
                    ondrop="communicatie.drop_member(event, true)">
                </ul>
            </div>
            <div>
                <h4>Not members</h4>
                <ul id="non_members_list"
                    class="member-drop-zone"
                    ondragover="event.preventDefault()"
                    ondrop="communicatie.drop_member(event, false)">
                </ul>
            </div>
        </div>
        <button id="close_member_manager">Done</button>
    </div>

    <div id="messages" class="messages"></div>

    <div id="input_area" class="input-area">
        <div id="reply_context" class="hidden"></div>
        <div id="image_preview" class="hidden"></div>
        <div class="input-row">
            <div id="drop_zone"
                 class="drop-zone"
                 ondragover="event.preventDefault()"
                 ondrop="communicatie.drop_image(event)">
                Drop image
            </div>
            <textarea id="message_input" placeholder="Message…" rows="1" maxlength="4096"></textarea>
            <button id="send_btn">Send</button>
        </div>
    </div>

</section>
