<div class="login-page">
    <h1>Messages</h1>
    <a class="login-wiki-link" href="{{ base_path }}/wiki/">What is this? →</a>

    <div id="join_banner" class="login-join-banner hidden">
        <p id="join_banner_text"></p>
        <button type="button" id="join_elsewhere_btn" class="secondary">I already have an account elsewhere</button>
    </div>

    <div class="login-card">
        <h2>Login</h2>
        <form id="login_form">
            <input type="text"     id="login_name"     placeholder="Username" autocomplete="username" required>
            <input type="password" id="login_password" placeholder="Password" autocomplete="current-password" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <div class="login-card">
        <h2>Register</h2>
        <form id="register_form">
            <input type="text"     id="register_name"     placeholder="Username" autocomplete="username" required>
            <input type="password" id="register_password" placeholder="Password (min 8 chars)" autocomplete="new-password" required>
            <button type="submit">Register</button>
        </form>
    </div>
</div>
